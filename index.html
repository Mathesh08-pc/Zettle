<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zettle — Your Study Hub</title>
    <meta name="description" content="Zettle is your centralized study hub. Access question papers, notes & more — organised by semester & subject.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4caf50">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">Zettle</a>
        <div class="nav-links" id="nav-links">
            <a href="index.html" class="nav-link active">Home</a>
            <a href="#semesters" class="nav-link">Semesters</a>
            <a href="#" class="nav-link">Notes</a>
            <a href="#" class="nav-link">QP Papers</a>
            <a href="#about" class="nav-link">About</a>
        </div>
        <a href="login.html" class="nav-plus-btn" title="Developer Access">+</a>
        <div class="nav-hamburger" id="nav-hamburger" onclick="document.getElementById('mobile-nav').classList.toggle('active')">
            <span></span><span></span><span></span>
        </div>
    </nav>
    <div class="mobile-nav" id="mobile-nav">
        <a href="index.html">Home</a>
        <a href="#semesters">Semesters</a>
        <a href="#">Notes</a>
        <a href="#">QP Papers</a>
        <a href="#about">About</a>

    </div>

    <!-- Hero -->
    <div class="page">
        <section class="hero-section">
            <div class="hero-badge">+ FOR ALL STUDENTS</div>
            <h1 class="hero-title">Your study hub.<br>All semesters.</h1>
            <p class="hero-subtitle">Question papers, notes & more — organised by semester & subject.</p>
        </section>

        <!-- Semester Grid -->
        <section class="semester-section" id="semesters">
            <div class="section-label">SELECT YOUR SEMESTER <span class="arrow">→</span></div>
            <div class="semester-grid" id="semester-grid">
                <!-- Populated by JS -->
            </div>

            <!-- Stats -->
            <div class="stats-bar" id="stats-bar">
                <!-- Populated by JS -->
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer" id="about">
        <p>© 2026 Zettle. Made with ❤️ for students. Free & open source.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="data.js"></script>
    <script>
        // Render semester grid
        const semGrid = document.getElementById('semester-grid');
        const totalSemesters = 8;

        for (let i = 1; i <= totalSemesters; i++) {
            const card = document.createElement('a');
            card.className = 'semester-card';
            card.href = SEMESTERS[i] ? `semester.html?sem=${i}` : '#';
            if (!SEMESTERS[i]) card.style.opacity = '0.35';
            card.innerHTML = `
                <div class="semester-num">${String(i).padStart(2, '0')}</div>
                <div class="semester-label">Semester</div>
            `;
            semGrid.appendChild(card);
        }

        // Render stats (start with static, then update from Supabase)
        let totalSubjects = 0;
        Object.values(SEMESTERS).forEach(s => totalSubjects += s.courses.length);

        let totalQP = 0, totalNotes = 0;
        Object.values(MATERIALS).forEach(courseM => {
            courseM.forEach(m => {
                if (m.category === 'qp') totalQP++;
                else if (m.category === 'notes') totalNotes++;
            });
        });

        const statsBar = document.getElementById('stats-bar');
        const stats = [
            { num: Object.keys(SEMESTERS).length, label: 'Semesters', id: 'stat-semesters' },
            { num: totalSubjects, label: 'Subjects', id: 'stat-subjects' },
            { num: totalQP || '—', label: 'QP Papers', id: 'stat-qp' },
            { num: totalNotes || '—', label: 'Notes PDFs', id: 'stat-notes' },
        ];
        stats.forEach(s => {
            const el = document.createElement('div');
            el.className = 'stat-item';
            el.innerHTML = `<div class="stat-number" id="${s.id}">${s.num}</div><div class="stat-label">${s.label}</div>`;
            statsBar.appendChild(el);
        });

        // Fetch live stats from Supabase
        async function fetchLiveStats() {
            try {
                const { count: qpCount } = await supabaseClient.from('materials').select('*', { count: 'exact', head: true }).eq('category', 'qp');
                const { count: notesCount } = await supabaseClient.from('materials').select('*', { count: 'exact', head: true }).eq('category', 'notes');
                if (qpCount !== null) document.getElementById('stat-qp').textContent = (totalQP + qpCount) || '—';
                if (notesCount !== null) document.getElementById('stat-notes').textContent = (totalNotes + notesCount) || '—';
            } catch (e) { console.error('Stats fetch error:', e); }
        }
        fetchLiveStats();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
